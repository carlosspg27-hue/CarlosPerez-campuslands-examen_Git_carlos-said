<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Eventify Campus</title>
    <link rel="icon" href="../resources/img/logo.jpeg">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>

<body>

    <header class="navbar">
        <div class="logo-container">
            <div class="logo-icon">
                <a href="../index.html">
                    <img src="../resources/img/logo.jpeg" alt="logo">
                </a>
            </div>
            <div>
                <span class="logo-title">Eventify Campus</span>
                <p class="logo-subtitle">Tu gestor de eventos favorito</p>
            </div>
        </div>
        <nav class="nav-links">
            <a href="../index.html">Eventos</a>
            <a href="nostros.html">Nosotros</a>
            <a href="#" class="active">Contacto</a>
        </nav>
        <nav class="nav-acions">
            <button class="btn-carrito">Carrito</button>
            <a href="login.html">
                <button class="btn-panel">ADMIN</button>
            </a>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <div class="contact-card">
                <h2>¿Necesitas ayuda?</h2>
                <p>Déjanos tus datos y nuestro equipo te contactará pronto.</p>

                <form id="form-contacto">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" rows="5" placeholder="Cuéntanos cómo podemos ayudarte..."
                            required></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Enviar por WhatsApp</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <h3>Eventify Campus</h3>
        <p>© 2026 Eventify Campus. Todos los derechos reservados.</p>
    </footer>

    <script src="../js/cliente.js"></script>
    <script src="../js/contacto.js"></script>
</body>

</html>
