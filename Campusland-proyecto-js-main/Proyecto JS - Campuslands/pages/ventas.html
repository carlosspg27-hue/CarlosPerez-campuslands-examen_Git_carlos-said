<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas - Eventify Campus</title>
    <link rel="icon" href="../resources/img/logo.jpeg">
    <link rel="stylesheet" href="../css/ventas.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>

    <div class="main-layout">

        <div id="sidebar-container"></div>

        <main class="dashboard-container">
            <section class="content">
                <header class="content-header">
                    <h1>Gestión de Ventas</h1>
                    <div class="header-actions">
                        <button id="btn-recargar-ventas" class="btn-secondary" style="background: #e2e8f0; color: #334155; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                            ↻ Recargar
                        </button>
                    </div>
                </header>

                <div class="sales-summary" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div class="summary-card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                        <h4 style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px;">Total Ventas</h4>
                        <p id="resumen-total-ventas" style="font-size: 1.8rem; font-weight: 800; color: #1e3a8a; margin: 0;">0</p>
                    </div>
                    <div class="summary-card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                        <h4 style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px;">Ingresos Totales</h4>
                        <p id="resumen-ingresos-totales" style="font-size: 1.8rem; font-weight: 800; color: #16a34a; margin: 0;">$0</p>
                    </div>
                    <div class="summary-card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                        <h4 style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px;">Ventas del Mes</h4>
                        <p id="resumen-ventas-mes" style="font-size: 1.8rem; font-weight: 800; color: #f59e0b; margin: 0;">0</p>
                    </div>
                </div>
                <section class="table-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3 style="color: #1e293b;">Historial de Ventas</h3>
                        <span id="contador-ventas" style="color: #64748b; font-size: 0.9rem;">0 registros</span>
                    </div>
                    <table id="tabla-ventas">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Cliente</th>
                                <th>Ciudad</th>
                                <th>Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="body-ventas">
                        </tbody>
                    </table>
                </section>
            </section>
        </main>
    </div>

    <div id="modal-detalle-venta" class="modal-overlay">
        <div class="modal-content-venta">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;">
                <h2 style="color: #1e3a8a; margin: 0;">Detalle del Pedido</h2>
                <button id="btn-cerrar-detalle" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #94a3b8;">&times;</button>
            </div>
            <div id="contenido-detalle" style="max-height: 60vh; overflow-y: auto;">
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/ventas.js"></script>
</body>

</html>
