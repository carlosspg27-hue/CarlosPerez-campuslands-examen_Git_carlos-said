<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify campus</title>
    <link rel="icon" href="../resources/img/logo.jpeg">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="login-body">
    <header>
        <h1 class="titulo">Eventify campus</h1>
        <p>Gestión Corporativa de Alto Nivel</p>
    </header>

    <main class="login-main">
        <h2 class="subtitulo">Bienvenido</h2>
        <p>Inicie sesión para acceder a su panel</p>

        <form id="form">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" placeholder="nombre@empresa.com" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" required>

            <button type="submit">Iniciar Sesión</button>
            <a href="../index.html">Volver al inicio</a>
        </form>
    </main>

    <footer>
        <p>© 2026 Eventify campus</p>
    </footer>

    <script src="../js/login.js"></script>
</body>

</html>
